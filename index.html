<!DOCTYPE html>
<html lang="es">

<head>
  <base href="/Kapital_PT/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Anti-Caché Headers -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Descripción y SEO -->
  <meta name="description" content="Tu futuro financiero empieza aquí">
  <meta name="theme-color" content="#F5F5F5" id="theme-color-meta">

  <!-- Script para aplicar el color de la barra de estado según el tema guardado -->
  <script>
    (function () {
      // flutter_secure_storage en web guarda en localStorage con este prefijo
      const theme = localStorage.getItem('flutter.theme_mode');
      const isDark = theme === 'dark' ||
        (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      const color = isDark ? '#0D0D0D' : '#F5F5F5';
      document.getElementById('theme-color-meta').setAttribute('content', color);
      document.documentElement.style.backgroundColor = color;
    })();
  </script>


  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kapital">
  <link rel="apple-touch-icon" href="icons/kapital_192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/kapital_192.png" />

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>Kapital</title>
</head>

<body>
  <style>
    /* Edge-to-edge: el contenido de Flutter ocupa toda la pantalla incluyendo la status bar */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      /* Extiende el cuerpo bajo la barra de notificaciones en PWA */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      box-sizing: border-box;
    }

    /* Flutter canvas ocupa todo */
    flt-glass-pane,
    flt-scene,
    canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
