<!DOCTYPE html>
<html lang="es">

<head>
  <base href="/Kapital_PT/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Anti-Caché Headers -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Descripción y SEO -->
  <meta name="description" content="Tu futuro financiero empieza aquí">
  <meta name="theme-color" content="#F5F5F5" id="theme-color-meta">

  <!-- Script para aplicar el color de la barra de estado según el tema guardado -->
  <script>
    (function () {
      function applyThemeColor(isDark) {
        const color = isDark ? '#0D0D0D' : '#F5F5F5';
        const meta = document.getElementById('theme-color-meta');
        if (meta) meta.setAttribute('content', color);
        document.documentElement.style.setProperty('--app-bg', color);
        document.body.style.backgroundColor = color;
      }

      // Función global para que Flutter la llame
      window.updatePWATheme = function(isDark) {
        applyThemeColor(isDark);
      };

      // Inicialización rápida
      const savedTheme = localStorage.getItem('flutter.theme_mode') || localStorage.getItem('app_theme');
      const isDark = savedTheme === '"dark"' || savedTheme === 'dark' ||
        (savedTheme !== '"light"' && savedTheme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      
      applyThemeColor(isDark);
    })();
  </script>

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kapital">
  <link rel="apple-touch-icon" href="icons/kapital_192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/kapital_192.png" />

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>Kapital</title>
</head>

<body>
  <style>
    :root {
      --app-bg: #F5F5F5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --app-bg: #0D0D0D;
      }
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: var(--app-bg) !important;
      overflow: hidden;
      position: fixed;
    }

    /* Edge-to-edge: el contenido de Flutter ocupa toda la pantalla incluyendo la status bar */
    /* Eliminamos los paddings de safe-area para permitir edge-to-edge real */
    /* box-sizing: border-box; */ /* This was removed as it's not needed with 100vw/100vh and fixed positioning */

    /* Flutter canvas ocupa todo */
    flt-glass-pane,
    flt-scene,
    canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>

  <div id="pwa-splash" style="
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
    background-color: var(--app-bg);
  ">
    <img src="icons/kapital_192.png" alt="Kapital" style="width: 120px; height: 120px; opacity: 0.8;">
  </div>

  <!-- Banner de instalación PWA -->
  <div id="pwa-install-banner" style="
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 99999;
    background: linear-gradient(135deg, #1a1a1a 0%, #0D0D0D 100%);
    border-top: 1px solid rgba(212, 175, 55, 0.4);
    padding: 14px 20px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
    box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    align-items: center;
    gap: 14px;
  ">
    <!-- Icono -->
    <img src="icons/kapital_192.png" style="width:44px; height:44px; border-radius:10px; flex-shrink:0;" alt="Kapital">
    <!-- Texto -->
    <div style="flex:1; min-width:0;">
      <div style="color:#D4AF37; font-weight:700; font-size:15px; margin-bottom:2px;">Kapital</div>
      <div style="color:#aaa; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Instala la
        app para acceso rápido</div>
    </div>
    <!-- Botón instalar -->
    <button id="pwa-install-btn" style="
      background: linear-gradient(135deg, #D4AF37, #b8932e);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
    ">📲 Instalar</button>
    <!-- Botón cerrar -->
    <button id="pwa-dismiss-btn" style="
      background: transparent;
      border: none;
      color: #666;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      flex-shrink: 0;
      line-height: 1;
    ">✕</button>
  </div>

  <script>
    (function () {
      var deferredPrompt = null;
      var banner = document.getElementById('pwa-install-banner');
      var installBtn = document.getElementById('pwa-install-btn');
      var dismissBtn = document.getElementById('pwa-dismiss-btn');

      // No mostrar si ya fue descartado antes
      if (localStorage.getItem('pwa-install-dismissed') === '1') return;

      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        // Mostrar banner con pequeño delay para que la app cargue primero
        setTimeout(function () {
          banner.style.display = 'flex';
        }, 3000);
      });

      installBtn.addEventListener('click', function () {
        banner.style.display = 'none';
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function (result) {
            deferredPrompt = null;
            if (result.outcome === 'accepted') {
              localStorage.setItem('pwa-install-dismissed', '1');
            }
          });
        }
      });

      dismissBtn.addEventListener('click', function () {
        banner.style.display = 'none';
        localStorage.setItem('pwa-install-dismissed', '1');
      });

      // Si ya está instalada como PWA, nunca mostrar
      if (window.matchMedia('(display-mode: standalone)').matches) {
        localStorage.setItem('pwa-install-dismissed', '1');
      }
    })();
  </script>

</body>

</html>
