name: kapital_app
description: "Sistema de gestión integral para control de rutas y personal."
publish_to: 'none'

version: 1.5.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  provider: ^6.1.1
  font_awesome_flutter: ^10.7.0
  local_auth: ^3.0.1
  local_auth_android: ^2.0.5
  local_auth_darwin: ^2.0.3
  flutter_secure_storage: ^10.0.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^17.2.4
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icons/kapital_512.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "icons/kapital_512.png"


flutter:
  uses-material-design: true

  assets:
    - assets/logoKapital.png
    - assets/icons/google_icon.png
    - assets/icons/apple_icon.png